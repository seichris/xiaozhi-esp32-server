# Docker安装Server

version: '3'
services:
  xiaozhi-esp32-server:
    image: ghcr.io/xinnan-tech/xiaozhi-esp32-server:server_latest
    container_name: xiaozhi-esp32-server
    restart: always
    security_opt:
      - seccomp:unconfined
    environment:
      - TZ=Asia/Shanghai
      - XIAOZHI_LLM_BASE_URL=${XIAOZHI_LLM_BASE_URL:-}
      - XIAOZHI_LLM_MODEL_NAME=${XIAOZHI_LLM_MODEL_NAME:-hermes-agent}
      - XIAOZHI_LLM_API_KEY=${XIAOZHI_LLM_API_KEY:-dummy}
      - XIAOZHI_LLM_PROVIDER_NAME=${XIAOZHI_LLM_PROVIDER_NAME:-HermesLLM}
      - XIAOZHI_INTENT_MODULE=${XIAOZHI_INTENT_MODULE:-nointent}
      - XIAOZHI_ASR_PROVIDER=${XIAOZHI_ASR_PROVIDER:-}
      - XIAOZHI_ASR_MODEL_URL=${XIAOZHI_ASR_MODEL_URL:-https://modelscope.cn/models/iic/SenseVoiceSmall/resolve/master/model.pt}
      - XIAOZHI_TTS_PROVIDER=${XIAOZHI_TTS_PROVIDER:-}
      - XIAOZHI_TTS_VOICE=${XIAOZHI_TTS_VOICE:-}
      - XIAOZHI_TTS_LANGUAGE=${XIAOZHI_TTS_LANGUAGE:-}
      - XIAOZHI_PROMPT=${XIAOZHI_PROMPT:-}
      - XIAOZHI_WEBSOCKET_URL=${XIAOZHI_WEBSOCKET_URL:-}
      - XIAOZHI_VISION_EXPLAIN_URL=${XIAOZHI_VISION_EXPLAIN_URL:-}
    command:
      - sh
      - -lc
      - |
        mkdir -p /opt/xiaozhi-esp32-server/data
        python - <<'PY'
        import os
        import shutil
        import urllib.request
        import yaml

        config_path = "/opt/xiaozhi-esp32-server/data/.config.yaml"
        persistent_model_dir = "/opt/xiaozhi-esp32-server/data/models/SenseVoiceSmall"
        persistent_model_path = f"{persistent_model_dir}/model.pt"
        runtime_model_path = "/opt/xiaozhi-esp32-server/models/SenseVoiceSmall/model.pt"

        os.makedirs(persistent_model_dir, exist_ok=True)
        os.makedirs(os.path.dirname(runtime_model_path), exist_ok=True)
        if os.path.isdir(runtime_model_path):
            shutil.rmtree(runtime_model_path)
        elif os.path.lexists(runtime_model_path):
            os.unlink(runtime_model_path)

        if not os.path.exists(persistent_model_path):
            model_url = os.getenv("XIAOZHI_ASR_MODEL_URL")
            if model_url:
                urllib.request.urlretrieve(model_url, persistent_model_path)

        if os.path.exists(persistent_model_path):
            shutil.copyfile(persistent_model_path, runtime_model_path)

        if os.path.exists(config_path):
            with open(config_path, "r", encoding="utf-8") as f:
                config = yaml.safe_load(f) or {}
        else:
            config = {}

        server = config.setdefault("server", {})

        websocket_url = os.getenv("XIAOZHI_WEBSOCKET_URL")
        if websocket_url:
            server["websocket"] = websocket_url
        else:
            server.setdefault("websocket", "wss://xiaozhi.8o.vc/xiaozhi/v1/")

        vision_explain_url = os.getenv("XIAOZHI_VISION_EXPLAIN_URL")
        if vision_explain_url:
            server["vision_explain"] = vision_explain_url
        else:
            server.setdefault("vision_explain", "https://xiaozhi.8o.vc/mcp/vision/explain")

        selected_module = config.setdefault("selected_module", {})
        asr_provider = os.getenv("XIAOZHI_ASR_PROVIDER")
        if asr_provider:
            selected_module["ASR"] = asr_provider
        else:
            selected_module.setdefault("ASR", "FunASR")

        tts_provider = os.getenv("XIAOZHI_TTS_PROVIDER")
        tts_voice = os.getenv("XIAOZHI_TTS_VOICE")
        tts_language = os.getenv("XIAOZHI_TTS_LANGUAGE")
        if tts_provider:
            selected_module["TTS"] = tts_provider
        select_tts_module = selected_module.setdefault("TTS", "EdgeTTS")
        tts_config = config.setdefault("TTS", {}).setdefault(select_tts_module, {})
        if tts_voice:
            tts_config["voice"] = tts_voice
        if tts_language:
            tts_config["language"] = tts_language

        prompt_text = os.getenv("XIAOZHI_PROMPT")
        if prompt_text:
            config["prompt"] = prompt_text

        llm_base_url = os.getenv("XIAOZHI_LLM_BASE_URL")
        if llm_base_url:
            provider_name = os.getenv("XIAOZHI_LLM_PROVIDER_NAME", "HermesLLM")
            llm_type = os.getenv("XIAOZHI_LLM_TYPE", "openai")
            llm_model_name = os.getenv("XIAOZHI_LLM_MODEL_NAME", "hermes-agent")
            llm_api_key = os.getenv("XIAOZHI_LLM_API_KEY", "dummy")
            intent_module = os.getenv("XIAOZHI_INTENT_MODULE", "nointent")

            selected_module["LLM"] = provider_name
            selected_module["Intent"] = intent_module
            config.setdefault("LLM", {})[provider_name] = {
                "type": llm_type,
                "base_url": llm_base_url,
                "model_name": llm_model_name,
                "api_key": llm_api_key,
            }

        with open(config_path, "w", encoding="utf-8") as f:
            yaml.safe_dump(config, f, allow_unicode=True, sort_keys=False)
        PY
        exec python app.py
    ports:
      # ws服务端
      - "${XIAOZHI_WS_PORT_MAPPING:-8000}:8000"
      # http服务的端口，用于简单OTA接口(单服务部署)，以及视觉分析接口
      - "${XIAOZHI_HTTP_PORT_MAPPING:-8003}:8003"
    volumes:
      # 配置文件目录
      - xiaozhi-runtime-data:/opt/xiaozhi-esp32-server/data
volumes:
  xiaozhi-runtime-data:
